<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서아 강의 자료실</title>
<style>
  :root {
    --navy: #1a2744;
    --blue: #2563eb;
    --teal: #0d9488;
    --bg: #f8faff;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .hero {
    background: linear-gradient(135deg, #0a1628 0%, var(--navy) 60%, #1e3a8a 100%);
    color: #fff;
    padding: 64px 24px 52px;
    text-align: center;
  }
  .hero .badge { display: inline-block; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; padding: 5px 18px; font-size: 13px; margin-bottom: 18px; }
  .hero h1 { font-size: clamp(24px, 5vw, 38px); font-weight: 900; line-height: 1.25; margin-bottom: 10px; }
  .hero h1 span { color: #93c5fd; }
  .hero .sub { font-size: 15px; opacity: 0.75; }

  .container { max-width: 640px; margin: 0 auto; padding: 48px 16px 80px; }

  .course-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 20px;
    text-decoration: none;
    display: block;
    color: var(--text);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .course-card:hover { box-shadow: 0 8px 32px rgba(37,99,235,0.12); transform: translateY(-2px); }

  .cc-header { padding: 28px 28px 20px; display: flex; align-items: flex-start; gap: 18px; }
  .cc-icon { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
  .cc-icon.blue { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }
  .cc-icon.teal { background: linear-gradient(135deg, #0d9488, #14b8a6); }
  .cc-info .cc-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 4px; }
  .cc-info .cc-label.blue { color: var(--blue); }
  .cc-info .cc-label.teal { color: var(--teal); }
  .cc-info .cc-title { font-size: 20px; font-weight: 900; color: var(--navy); line-height: 1.2; margin-bottom: 4px; }
  .cc-info .cc-sub { font-size: 13px; color: var(--muted); }

  .cc-tags { padding: 0 28px 22px; display: flex; flex-wrap: wrap; gap: 6px; }
  .cc-tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
  .cc-tag.blue { background: #dbeafe; color: var(--blue); }
  .cc-tag.teal { background: #ccfbf1; color: #0d9488; }

  .cc-footer { background: #f8faff; border-top: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
  .cc-footer .cf-text { font-size: 13px; color: var(--muted); }
  .cc-footer .cf-arrow { font-size: 20px; color: var(--blue); }

  footer { background: var(--navy); color: rgba(255,255,255,0.45); text-align: center; padding: 24px 16px; font-size: 12px; }
</style>
</head>
<body>

<div class="hero">
  <div class="badge">📚 강의 자료실</div>
  <h1>서아의<br><span>강의 정리 모음</span></h1>
  <div class="sub">Claude 독립 정리본 · 헤르메스 버전과 비교용</div>
</div>

<div class="container">

  <a class="course-card" href="somun/index.html">
    <div class="cc-header">
      <div class="cc-icon blue">💬</div>
      <div class="cc-info">
        <div class="cc-label blue">COURSE 1</div>
        <div class="cc-title">소문설계 강의</div>
        <div class="cc-sub">제갈현열 소문설계 — 브랜드 소문 만들기 전략</div>
      </div>
    </div>
    <div class="cc-tags">
      <span class="cc-tag blue">소문의 법칙</span>
      <span class="cc-tag blue">2조 과제</span>
      <span class="cc-tag blue">도미다리 적용</span>
      <span class="cc-tag blue">1~3주차</span>
    </div>
    <div class="cc-footer">
      <span class="cf-text">somun/ 폴더</span>
      <span class="cf-arrow">›</span>
    </div>
  </a>

  <a class="course-card" href="jiwon/index.html">
    <div class="cc-header">
      <div class="cc-icon teal">💰</div>
      <div class="cc-info">
        <div class="cc-label teal">COURSE 2</div>
        <div class="cc-title">도원결의 무상지원금 마스터</div>
        <div class="cc-sub">정부지원사업 사업계획서 완전 정복 + 월간 세미나</div>
      </div>
    </div>
    <div class="cc-tags">
      <span class="cc-tag teal">1~4강 완료</span>
      <span class="cc-tag teal">6월 세미나</span>
      <span class="cc-tag teal">PSST 프레임워크</span>
      <span class="cc-tag teal">R&D 입문</span>
    </div>
    <div class="cc-footer">
      <span class="cf-text">jiwon/ 폴더</span>
      <span class="cf-arrow">›</span>
    </div>
  </a>

</div>

<footer>Claude 독립 정리본 · 강의 원본과 함께 참고하세요</footer>

</body>
</html>
